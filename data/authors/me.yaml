bio: "Hi! I am Xuewen ZHOU and you could call me Xuewen/Sherwin/シュウ. I am currently a master's student majoring in Computational Biology and Medical Sciences at the University of Tokyo.
      I am in the lab of Computational Genomics, supervised by [Prof. Ryuichiro Nakato](https://nakatolab.iqb.u-tokyo.ac.jp/members/rnakato/index.html).
       \n\n
      Before that, I completed my undergraduate studies in Software Engineering at Zhejiang University of Technology,
      where I pariticipated in various research projects and internship.
      I was under supervision for research in computer networks of [Prof. Kechen Zheng](https://kechenzheng.github.io/), who trained me to have a solid foundation in academic research.
      I also had the opportunity to be part of the team of [Prof. Guodao Sun](https://godoorsun.org/) and [Prof. Sixian Chan](https://scholar.google.com/citations?user=2xsZC9wAAAAJ&hl=zh-CN), where I was able to cooperate with PhD students and conducted research 
      in the field of Data Visualization for Multimodal Model Interpretation and Medical Image Segmentation, respectively.

      
       \n\n
       My current research interests mainly lie in the intersection of 
       AI for Science, especially in the areas of generative models for biomedical applications and AI agents for scientific discovery.
       I am highly self-motivated and eager to explore the potential of AI in advancing scientific research, and I am always open to new collaborations and opportunities in this exciting field.

      \n\n 
      Please feel free to reach out to me via email `xwzhou.sgk@gmail.com` if you are interested in my research or if you have any questions. 
      I am always happy to connect with fellow researchers and enthusiasts in the field of AI for Science!
      "

