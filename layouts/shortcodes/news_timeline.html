{{ $items := hugo.Data.news_timeline.items | default (slice) }}
{{ if gt (len $items) 0 }}
  <div class="news-timeline">
    {{ range sort $items "date" "desc" }}
      <div class="timeline-item">
        <div class="timeline-date">{{ .date }}</div>
        <div class="timeline-body">
          <strong>{{ .title }}</strong><br />
          {{ .summary }}
        </div>
      </div>
    {{ end }}
  </div>
{{ else }}
  <p>No news yet.</p>
{{ end }}
